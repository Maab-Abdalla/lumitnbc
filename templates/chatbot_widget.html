<!-- Chatbot Widget -->
<div id="chatbot-container">
  <button id="chatbot-toggle" class="chatbot-toggle" onclick="toggleChatbot()" aria-label="Open chat assistant">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
  </button>
  <div id="chatbot-window" class="chatbot-window">
    <div class="chatbot-header">
      <div style="display:flex;align-items:center;gap:12px;">
        <div style="width:36px;height:36px;background:rgba(255,255,255,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;">Li</div>
        <div>
          <div style="font-weight:600;font-size:14px;">LumiTNBC Assistant</div>
          <div style="font-size:12px;opacity:0.8;">Online</div>
        </div>
      </div>
      <button onclick="toggleChatbot()" aria-label="Close chat" style="background:none;border:none;color:white;cursor:pointer;font-size:22px;line-height:1;padding:4px;">&times;</button>
    </div>
    <div class="chatbot-messages" id="chatbot-messages">
      <div class="chatbot-message bot-message">
        <div class="message-avatar">Li</div>
        <div class="message-content">
          <p>Hello! I'm the LumiTNBC Assistant. How can I help you today?</p>
          <div class="message-suggestions">
            <button onclick="sendMessage('What is TNBC?')">What is TNBC?</button>
            <button onclick="sendMessage('How does the classification work?')">How does it work?</button>
            <button onclick="sendMessage('What data do I need?')">What data needed?</button>
          </div>
        </div>
      </div>
    </div>
    <div class="chatbot-input">
      <input type="text" id="chatbot-input-field" placeholder="Type your message..." onkeypress="handleKeyPress(event)">
      <button onclick="sendUserMessage()" aria-label="Send message">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
      </button>
    </div>
  </div>
</div>
<script src="{{ url_for('static', filename='js/chatbot.js') }}?v=7"></script>
